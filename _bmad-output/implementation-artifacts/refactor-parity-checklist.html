<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Чек-лист приёмки рефактора Eat&amp;fit</title>
<style>
  :root{--bg:#0f1115;--card:#1a1d23;--text:#e8e8ea;--hint:#9aa0a8;--line:#2a2e36;--green:#2ecc71}
  @media(prefers-color-scheme:light){:root{--bg:#f4f5f7;--card:#fff;--text:#1a1a1a;--hint:#6b7280;--line:#e5e7eb}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:16px/1.45 -apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:860px;margin:0 auto;padding:20px 16px 80px}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--hint);font-size:13px;margin-bottom:16px}
  .bar{position:sticky;top:0;background:var(--bg);padding:10px 0;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;z-index:5}
  .track{flex:1;height:10px;background:var(--line);border-radius:6px;overflow:hidden}
  .fill{height:100%;background:var(--green);width:0;transition:width .25s}
  .count{font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:8px;padding:6px 10px}
  h2{font-size:15px;color:var(--hint);text-transform:uppercase;letter-spacing:.04em;margin:22px 0 8px}
  .item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;user-select:none}
  .item:hover{border-color:var(--hint)}
  .dot{font-size:15px;line-height:1.4;flex-shrink:0}
  .item.done .txt{color:var(--hint)}
  .txt{flex:1}
  code{background:rgba(127,127,127,.18);padding:1px 5px;border-radius:5px;font-size:13px}
</style></head><body><div class="wrap">
  <h1>Чек-лист приёмки рефактора Eat&amp;fit</h1>
  <div class="sub">Клик по пункту — переключает 🔴↔🟢. Прогресс сохраняется в этом браузере.</div>
  <div class="bar"><div class="track"><div class="fill" id="fill"></div></div>
    <span class="count" id="count">0 / 0</span>
    <button id="reset">Сбросить</button></div>
  <div id="list"></div>
</div><script>
const DATA = [{"title":"0. Запуск и инфраструктура","items":[{"done":true,"html":"<code>docker compose up -d</code> — Postgres <code>eatfit</code> healthy (<code>docker compose ps</code>). ✓🔌"},{"done":true,"html":"<code>.env</code> заполнен: <code>DATABASE<i>URL</code>, <code>JWT</i>SECRET</code> (≥32), <code>BOT<i>TOKEN</code>, <code>ADMIN</i>TELEGRAM<i>IDS</code>, <code>BOT</i>USERNAME</code>. ✓🔌"},{"done":true,"html":"<code>npm install</code> без ошибок. ✓🔌"},{"done":true,"html":"<code>npm run build</code> — собирается всё (shared → web → api), 0 ошибок. ✓🔌"},{"done":true,"html":"<code>npm start</code> (или <code>npm run dev</code>) — лог <code>Eat&amp;fit API запущен на порту 3000</code>, без ERROR. ✓🔌"},{"done":true,"html":"Лог <code>Планировщик итогов дня: HH:00 (UTC+5)</code> присутствует (cron поднялся). ✓🔌"},{"done":true,"html":"Лог <code>Меню команд установлено</code> (setMyCommands отработал). ✓🔌"},{"done":true,"html":"🌐 <code>http://localhost:3000/</code> отдаёт SPA; <code>http://localhost:3000/api/menu</code> → 200 JSON. ✓🔌"},{"done":true,"html":"Старый бот (<code>src/bot.js</code>) <b>не запускается</b> (удалён) — нет конфликта polling 409. ✓🔌"}]},{"title":"1. FR-A — Авторизация","items":[{"done":true,"html":"🔌 <code>POST /api/auth/telegram</code> с валидной <code>initData</code> → <code>{ accessToken, client }</code>. ✓🔌"},{"done":true,"html":"🔌 <code>POST /api/auth/telegram</code> с битой/просроченной <code>initData</code> → 401. ✓🔌"},{"done":true,"html":"🔌 Запрос к <code>/api/me</code> без <code>Authorization</code> → 401; с валидным JWT → 200. ✓🔌"},{"done":true,"html":"🔌 Клиент (роль client) на админ-ручку (<code>GET /api/admin/clients</code>) → 403. ✓🔌"},{"done":true,"html":"🤖 Пользователь из <code>ADMIN<i>TELEGRAM</i>IDS</code> после <code>/start</code> получает роль admin. ✓🔌 <i>(роль admin подтверждена; вид клавиатуры — визуально 🤖)</i>"}]},{"title":"2. FR-C — Клиенты / профиль / баланс","items":[{"done":true,"html":"🤖 <code>/start</code> для нового пользователя → выбор языка → имя → телефон → адрес → «Регистрация завершена»."},{"done":true,"html":"🤖 Поделиться контактом кнопкой на шаге телефона — принимается."},{"done":true,"html":"Профиль (данные + правка): <code>GET /api/me</code> и <code>PUT /api/me</code> обновляют имя/телефон/адрес. ✓🔌 <i>(бот/📱 рендер — визуально)</i>"},{"done":true,"html":"🤖 Смена языка (ru↔uz) — интерфейс переключается."},{"done":true,"html":"📱 Профиль: правка имени/телефона/адреса, переключатель языка (UI)."},{"done":false,"html":"📱 Незарегистрированный (нет телефона/адреса) видит <b>форму регистрации</b>, не вкладки (FR-F3)."},{"done":false,"html":"🤖 «💰 Мой баланс» + кнопка «Пополнить» (контакты из настроек или «не указано»)."}]},{"title":"3. FR-M — Меню / фото","items":[{"done":false,"html":"🤖 <code>/menu</code> — витрина по категориям (основные/напитки/десерты) с фото и ценой."},{"done":false,"html":"📱 Вкладка «Меню» — то же, фото грузятся через <code>/api/menu/:id/photo</code>."},{"done":true,"html":"🌐 <code>GET /api/menu</code> доступен <b>без</b> авторизации (публичная витрина). ✓🔌"},{"done":true,"html":"Демо-меню засеяно: <b>12 блюд, все 3 категории</b> (<code>MenuSeeder</code>, идемпотентно). ✓🔌"},{"done":true,"html":"Админ создаёт блюдо (категория/названия ru+uz/описание/цена) — <code>POST /api/admin/menu</code>. ✓🔌 <i>(через 📱-UI — визуально)</i>"},{"done":true,"html":"Админ: изменить / скрыть-показать / удалить (<code>PUT</code>,<code>PATCH /active</code>,<code>DELETE</code>). ✓🔌 <i>(через 📱-UI — визуально)</i>"},{"done":true,"html":"Скрытое блюдо <b>не показывается</b> в витрине (<code>findActive</code> фильтрует). ✓🔌"}]},{"title":"4. FR-O — Корзина и заказы","items":[{"done":false,"html":"🤖 Степпер ➖/➕ в меню — количество в корзине меняется (➖ на нуле не даёт ошибку)."},{"done":false,"html":"🤖 Оформление: сводка корзины → комментарий (или «без») → выбор оплаты (UI-флоу)."},{"done":true,"html":"Оплата с баланса доступна только при достатке (недостаток → ошибка). ✓🔌"},{"done":true,"html":"Создание заказа → номер заказа; корзина очищается. ✓🔌"},{"done":true,"html":"При оплате с баланса баланс <b>списывается</b> ровно на сумму заказа (100000−70000=30000). ✓🔌"},{"done":true,"html":"«Мои заказы» — список заказов клиента (<code>GET /api/orders</code>). ✓🔌 <i>(рендер 🤖/📱 — визуально)</i>"},{"done":true,"html":"🔌 Цена заказа берётся из БД, а не из запроса (в <code>CreateOrderDto</code> цены нет; total=2×цена). ✓🔌"},{"done":false,"html":"🤖 Deep link <code>https://t.me/&lt;bot&gt;?start=item_&lt;id&gt;</code> — открывает меню и кладёт блюдо (1 шт)."},{"done":false,"html":"🤖 Повар: «Режим повара» → активные заказы → кнопки переходов (UI)."},{"done":false,"html":"🤖 Курьер: «Режим курьера» → заказы cooking/delivering → «на доставку»/«доставлен» (UI)."},{"done":false,"html":"🤖 Клиент получает уведомление при каждой смене статуса (доставка)."},{"done":true,"html":"Админ отменяет заказ → статус cancelled + <b>возврат</b> оплаченного на баланс (→100000). ✓🔌"},{"done":true,"html":"🔌 Невалидный переход статуса (confirmed→done) или не той ролью → отклонён (409). ✓🔌"}]},{"title":"5. FR-D — Депозиты","items":[{"done":false,"html":"🤖 Админ → «➕ Пополнить баланс» → поиск клиента → сумма → пополнено (бот-флоу)."},{"done":false,"html":"📱 Админ → Люди → поиск → ввод суммы → «Пополнить» (UI)."},{"done":false,"html":"🤖 Клиент получает уведомление о пополнении; приходит уведомление в админ-группу (доставка)."},{"done":true,"html":"<code>POST /api/admin/deposits</code> → запись в <code>deposits</code> + баланс растёт; возврат уникален на заказ. ✓🔌"}]},{"title":"6. FR-S — Настройки","items":[{"done":false,"html":"🤖 Админ → «⚙️ Настройки» → правка контактов пополнения и «Поддержки» (бот-флоу)."},{"done":false,"html":"📱 Админ → Настройки → те же поля (UI)."},{"done":false,"html":"🤖 После задания контактов «Пополнить» и «Поддержка» показывают реальные значения/кнопку."},{"done":true,"html":"<code>GET</code>/<code>PUT /api/admin/settings</code> (только админ; client → 403). ✓🔌"}]},{"title":"7. FR-B — Бот (команды и роли)","items":[{"done":false,"html":"🤖 Команды <code>/start</code>, <code>/menu</code>, <code>/profile</code> работают."},{"done":false,"html":"🤖 У <b>обычного</b> пользователя в меню команд <b>нет</b> <code>/admin</code> и <code>/report</code>."},{"done":false,"html":"🤖 У админа <code>/admin</code> открывает панель, <code>/report</code> шлёт итоги."},{"done":false,"html":"🤖 Reply-клавиатура соответствует роли (повар видит «Режим повара» и т.д.)."},{"done":false,"html":"🤖 Кнопка/команда <code>/admin</code> обычному пользователю недоступна (молча)."},{"done":false,"html":"🤖 FR-B4: Админ → «📢 Пост в канал» → выбор блюда → превью → публикация в <code>CHANNEL_ID</code>"},{"done":true,"html":"Смена роли клиента админом (<code>POST /api/admin/clients/:id/role</code>). ✓🔌 <i>(бот-кнопки — визуально)</i>"}]},{"title":"8. FR-R — Отчёты","items":[{"done":false,"html":"🤖 Админ → «📈 Отправить итоги» / <code>/report</code> — отчёт приходит админу и в админ-группу."},{"done":false,"html":"Отчёт содержит: всего/доставлено/в процессе/отменено, выручку, средний чек, топ блюд,"},{"done":false,"html":"(Опц.) Дождаться <code>DAILY<i>REPORT</i>HOUR</code> — авто-отчёт в админ-группу."}]},{"title":"9. FR-F — Фронт (Mini App)","items":[{"done":false,"html":"📱 Внутри Telegram — полный функционал (меню/корзина/заказы/профиль/админ)."},{"done":false,"html":"🌐 В браузере без Telegram — <code>AppGate</code> показывает «Откройте в Telegram» (auth невозможен)."},{"done":false,"html":"📱 Вкладка «Админ» видна <b>только</b> админам."},{"done":false,"html":"📱 i18n RU/UZ переключается по языку профиля."},{"done":false,"html":"📱 Тема (светлая/тёмная) подхватывается из Telegram."},{"done":false,"html":"📱 В админ-поиске людей — живой фильтр (по мере ввода) (FR-F6)."},{"done":false,"html":"📱 Бейдж количества на иконке корзины."}]},{"title":"10. NFR / Безопасность / целостность","items":[{"done":true,"html":"🔌 <code>GET /api/me</code> чужой записи невозможен — нет id в пути; чужой заказ → 404 (нет IDOR). ✓🔌"},{"done":true,"html":"🔌 Деньги в JSON — строки (<code>balance</code>, <code>total</code>, <code>price</code>), не float. ✓🔌"},{"done":true,"html":"🔌 Баланс не уходит в минус; переплата с баланса → ошибка (409). ✓🔌"},{"done":false,"html":"🔌 Фото-прокси отдаёт только по <code>file_id</code>/whitelisted URL; токен бота не утекает клиенту."},{"done":true,"html":"Bot-callback authz: подделанный переход чужого заказа/не той ролью — домен отвергает (FSM+роль). ✓🔌 <i>(та же <code>OrdersService.transition</code>, что и у бота)</i>"},{"done":true,"html":"🔌 Лишние/неизвестные поля в теле запроса режутся (ValidationPipe whitelist → 400). ✓🔌"},{"done":false,"html":"Логи без утечки секретов (BOT_TOKEN/JWT/initData не в открытом виде)."}]},{"title":"11. Веб-аккаунты — регистрация на сайте (телефон + пароль)","items":[{"done":true,"html":"🔌 <code>POST /api/auth/register</code> (имя/телефон/пароль) → 201 + JWT; <code>telegramId=null</code>, <code>role=client</code>. ✓🔌"},{"done":true,"html":"🔌 <code>POST /api/auth/login</code> (телефон+пароль) → JWT; <code>/me</code> работает веб-токеном. ✓🔌"},{"done":true,"html":"🔌 Неверный пароль → 401; короткий → 400; повтор телефона → 409. ✓🔌"},{"done":true,"html":"Веб-пользователь оформляет заказ (адрес → корзина → заказ) и видит свои заказы. ✓🔌"},{"done":false,"html":"📱 Вне Telegram (браузер) — экран входа/регистрации; сессия persist между перезагрузками."},{"done":false,"html":"🤖 Профиль → «🔐 Пароль для сайта»: Telegram-клиент задаёт пароль и входит на сайте по телефону+паролю."}]},{"title":"12. Известные дельты (подтвердить приёмку — это НЕ баги, осознанный объём)","items":[{"done":false,"html":"<b>FR-M4 (частично):</b> фото задаётся по <b>URL</b>; загрузка файлом (Telegram <code>file_id</code> /"},{"done":false,"html":"<b>Меню-CRUD через бота</b> не реализован (есть через Mini App-админку и API). Приемлемо? _<i>да / нет</i>_"},{"done":false,"html":"<b>SPA-CSP</b> отключён (helmet <code>contentSecurityPolicy:false</code>) — корректный CSP с nonce"},{"done":false,"html":"<b>Корзина in-memory</b> (сбрасывается при рестарте, один инстанс) — приемлемо до прода? _<i>да / нет</i>_"}]},{"title":"Итог","items":[{"done":false,"html":"Все обязательные пункты (0–11) пройдены <i>(🔌-ядро авто-подтверждено; осталось 🤖/📱 вручную)</i>."},{"done":false,"html":"Дельты (12) явно приняты или вынесены в бэклог."},{"done":false,"html":"Решение: рефактор принят → можно коммит/пуш/деплой на Railway."}]}];
const TOTAL = 86;
const KEY = 'eatfit-checklist-v1';
const saved = JSON.parse(localStorage.getItem(KEY) || '{}');
const list = document.getElementById('list');
DATA.forEach((sec, si) => {
  const h = document.createElement('h2'); h.textContent = sec.title; list.appendChild(h);
  sec.items.forEach((it, ii) => {
    const key = si + '#' + ii;
    const done = key in saved ? saved[key] : it.done;
    const row = document.createElement('div');
    row.className = 'item' + (done ? ' done' : '');
    row.dataset.key = key;
    row.innerHTML = '<span class="dot">' + (done ? '🟢' : '🔴') + '</span><span class="txt">' + it.html + '</span>';
    row.addEventListener('click', () => toggle(row));
    list.appendChild(row);
  });
});
function render(){
  let d = 0; document.querySelectorAll('.item.done').forEach(() => d++);
  document.getElementById('count').textContent = d + ' / ' + TOTAL;
  document.getElementById('fill').style.width = (TOTAL ? d/TOTAL*100 : 0) + '%';
}
function toggle(row){
  const on = !row.classList.contains('done');
  row.classList.toggle('done', on);
  row.querySelector('.dot').textContent = on ? '🟢' : '🔴';
  saved[row.dataset.key] = on;
  localStorage.setItem(KEY, JSON.stringify(saved));
  render();
}
document.getElementById('reset').addEventListener('click', () => { localStorage.removeItem(KEY); location.reload(); });
render();
</script></body></html>
