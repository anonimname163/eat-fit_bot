# Локальный Postgres для разработки. Данные одноразовы (демо) — том можно удалять.
# Запуск:   docker compose up -d
# Остановка: docker compose down       (с очисткой данных: docker compose down -v)
services:
  postgres:
    image: postgres:16-alpine
    container_name: eatfit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eatfit
    ports:
      - '5432:5432'
    volumes:
      - eatfit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d eatfit']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  eatfit_pgdata:
